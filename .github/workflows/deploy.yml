name: Deploy OTA

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm OTA deployment"
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  confirm-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify ref is main
        if: github.ref != 'refs/heads/main'
        run: exit 1
      - name: Validate confirmation
        if: inputs.confirm != 'deploy'
        run: exit 1

  validate:
    needs: [confirm-deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"
      - run: bun install --frozen-lockfile
      - run: just validate

  deploy:
    needs: [confirm-deploy, validate]
    if: ${{ !cancelled() && needs.confirm-deploy.result == 'success' && needs.validate.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"
      - run: bun install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Deploy OTA update
        run: eas update --channel production --message "OTA (${{ github.sha }})" --non-interactive
